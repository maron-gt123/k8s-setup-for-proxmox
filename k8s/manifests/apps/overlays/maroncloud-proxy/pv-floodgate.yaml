apiVersion: v1
kind: PersistentVolume
metadata:
  name: maron-floodgate-pv
  labels:
    app: maron-floodgate-pv
spec:
  storageClassName: "nfs-storage"
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.6.140
    path: /kubanetesu-NFS/mc-proxy/geyser