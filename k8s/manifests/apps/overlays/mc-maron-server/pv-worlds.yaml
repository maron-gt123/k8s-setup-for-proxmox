apiVersion: v1
kind: PersistentVolume
metadata:
  name: maron-java-lobby-world-pv
  labels:
    app: maron-java-lobby-world-pv
spec:
  storageClassName: "nfs-storage"
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.6.140
    path: /kubanetesu-NFS/mc-maron/lobby/world