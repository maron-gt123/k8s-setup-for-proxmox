apiVersion: v1
kind: Service
metadata:
  name: mc-geyser-lb
  labels:
    app: geyser-standalone
spec:
  type: LoadBalancer
  ports:
    - name: bedrock-service
      port: 53617
      protocol: UDP
      targetPort: bedrock-service
  selector:
    app: geyser-standalone
  loadBalancerIP: 172.1.0.0
