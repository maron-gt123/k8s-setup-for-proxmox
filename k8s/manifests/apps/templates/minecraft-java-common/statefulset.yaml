apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft
  labels:
    app: minecraft
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      initContainers:
        # initcontainersでjmx-exporterをダウンロード
        - name: jmx-exporter-downloader
          image: busybox:1.37.0
          env:
            - name: JMX_EXPORTER_URL
              value: "https://repo1.maven.org/maven2/io/prometheus/jmx/jmx_prometheus_javaagent/1.0.1/jmx_prometheus_javaagent-1.0.1.jar"
            - name: JMX_JDBC_URL
              value: "https://repo1.maven.org/maven2/org/mariadb/jdbc/mariadb-java-client/3.5.1/mariadb-java-client-3.5.1.jar"
          volumeMounts:
            - name: init-jmx-download-volume
              mountPath: /root/initContainer-download
          command:
            - sh
            - -c
            - >
              wget -O /root/initContainer-download/jmx-exporter-javaagent.jar "${JMX_EXPORTER_URL}" &&
              wget -O /root/initContainer-download/mariadb-java-client.jar "${JMX_JDBC_URL}"
        # initcontainersでprometheus-exporterをダウンロード
        - name: prometheus-exporter-downloader
          image: busybox:1.37.0
          env:
            - name: MC_PROM_EXPORTER_URL
              value: "https://github.com/sladkoff/minecraft-prometheus-exporter/releases/download/v3.1.2/minecraft-prometheus-exporter-3.1.2.jar"
          volumeMounts:
            - name: init-prometheus-download-volume
              mountPath: /root/initContainer-download
          command:
            - sh
            - -c
            - >
              wget -O /root/initContainer-download/minecraft-prometheus-exporter.jar "${MC_PROM_EXPORTER_URL}"
      containers:
        - image: itzg/minecraft-server:java25
          name: minecraft
          resources:
            requests:
              cpu: "2"
              memory: 2048M
          env:
            # ---- 基本設定 ---- 
            - name: TZ
              value: Asia/Tokyo
            - name: TYPE
              value: PAPER
            - name: INIT_MEMORY
              value: 2048M
            - name: MAX_MEMORY
              value: 2048M
            - name: EULA
              value: "TRUE"
            - name: COPY_CONFIG_DEST
              value: /data
            - name: REPLACE_ENV_VARIABLE_PREFIX
              value: CFG_
            # ---- server configの変数 ---- 
            - name: MAX_TICK_TIME
              value: "-1"
            - name: ONLINE_MODE
              value: "false"
            - name: CFG_FORWARDING_KEY
              valueFrom:
                secretKeyRef:
                  name: secret-velocity
                  key: CFG_FORWARDING_KEY
          ports:
            - name: mc-service
              containerPort: 25565
            - name: mc-metrics
              containerPort: 9225
          volumeMounts:
            # ------- init-file mount -------
            - name: init-jmx-download-volume
              mountPath: /jmx-exporter/jmx-exporter-javaagent.jar
              subPath: jmx-exporter-javaagent.jar
            - name: init-prometheus-download-volume
              mountPath: /config/plugins/minecraft-prometheus-exporter.jar
              subPath: minecraft-prometheus-exporter.jar
            # ------- jmx-exporter-config mount -------
            - name: jmx-exporter-config
              mountPath: /jmx-exporter/jmx-exporter-config.yaml
              subPath: jmx-exporter-config.yaml
            # ------- paper-config mount -------
            - name: paper-config
              mountPath: /config/config/
            # ------- prometeus-exporter mount -------
            - name: prometheus-exporter-config
              mountPath: /config/plugins/PrometheusExporter/config.yml
              subPath: prometheus-exporter-config.yml
      volumes:
        # ------- initで格納するvolume -------
        - name: init-jmx-download-volume
          emptyDir: {}
        - name: init-prometheus-download-volume
          emptyDir: {}
        - name: jmx-exporter-config
          configMap:
            name: jmx-exporter-config
        # ------- papermcのvolume -------
        - name: paper-config
          configMap:
            name: paper-config
        # ------- prometeus-exporterのvolume -------
        - name: prometheus-exporter-config
          configMap:
            name: prometheus-exporter-config