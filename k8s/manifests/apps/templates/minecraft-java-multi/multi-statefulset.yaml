apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minecraft
  labels:
    app: minecraft
spec:
  template:
    spec:
      initContainers:
      containers:
        - name: minecraft
          resources:
            requests:
              cpu: "2"
              memory: 4096M
          env:
            # ---- 基本設定 ---- 
            - name: VERSION
              value: "26.1.2"
            - name: INIT_MEMORY
              value: 4096M
            - name: MAX_MEMORY
              value: 4096M
            - name: EULA
              value: "TRUE"
            - name: PLUGINS
              value: >-
                https://cdn.modrinth.com/data/axTqSWQA/versions/SqR0biky/Advanced-Portals-Spigot-2.6.1.jar,
                https://download.luckperms.net/1631/bukkit/loader/LuckPerms-Bukkit-5.5.42.jar,
                https://hangarcdn.papermc.io/plugins/ArcanePlugins/SleepFixer/versions/2.1.0/PAPER/SleepFixer-2.1.0.jar,
                https://server-backup.net/assets/downloads/ServerBackup-2.10.0.jar
            # ---- server configの変数 ---- 
            - name: ENABLE_RCON
              value: "true"
            - name: DIFFICULTY
              value: easy
            - name: LEVEL_TYPE
              value: normal
            - name: SPIGET_RESOURCES
              value: 
            - name: RCON_CMDS_STARTUP
              value: |-
          ports:
            - name: mc-service
              containerPort: 25565
            - name: mc-rcon
              containerPort: 25575
            - name: mc-metrics
              containerPort: 9225
          volumeMounts:
            # ------- world-data mount -------
            - name: world-data
              mountPath: /data/world
            - name: nether-data
              mountPath: /data/world_nether
            - name: end-data
              mountPath: /data/world_the_end

      volumes:
        # worldデータの永続ストレージの指定
        - name: world-data
          persistentVolumeClaim:
            claimName: java-world-pvc
        - name: nether-data
          persistentVolumeClaim:
            claimName: java-nether-pvc
        - name: end-data
          persistentVolumeClaim:
            claimName: java-end-pvc